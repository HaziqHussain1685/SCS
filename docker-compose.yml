version: '3.8'

services:
  # Camera 1: Vulnerable - Default credentials, outdated firmware, HTTP + RTSP
  camera1-vulnerable:
    build: ./camera-simulator
    container_name: smartcam-demo-cam1
    environment:
      - MODEL=AcmeCam A1
      - FIRMWARE=1.0.2
      - DEFAULT_USER=admin
      - DEFAULT_PASS=admin
      - OPEN_PORTS=80,554
      - EXPOSED=false
    ports:
      - "8081:80"      # HTTP interface
      - "5541:554"     # RTSP stream
    networks:
      smartcam_net:
        ipv4_address: 172.25.0.11
    restart: unless-stopped

  # Camera 2: Secure - Strong credentials, up-to-date firmware, only HTTP
  camera2-secure:
    build: ./camera-simulator
    container_name: smartcam-demo-cam2
    environment:
      - MODEL=SafeView Pro 100
      - FIRMWARE=2.4.0
      - DEFAULT_USER=homeowner
      - DEFAULT_PASS=SecureP@ssw0rd2024!
      - OPEN_PORTS=80
      - EXPOSED=false
    ports:
      - "8082:80"      # HTTP interface only
    networks:
      smartcam_net:
        ipv4_address: 172.25.0.12
    restart: unless-stopped

  # Camera 3: Critical - Weak password, very old firmware, all insecure services, exposed
  camera3-critical:
    build: ./camera-simulator
    container_name: smartcam-demo-cam3
    environment:
      - MODEL=OldEye Z200
      - FIRMWARE=0.9.4
      - DEFAULT_USER=root
      - DEFAULT_PASS=12345
      - OPEN_PORTS=21,23,80,554
      - EXPOSED=true
    ports:
      - "8083:80"      # HTTP interface
      - "2121:21"      # FTP (vulnerable)
      - "2323:23"      # Telnet (vulnerable)
      - "5543:554"     # RTSP stream
    networks:
      smartcam_net:
        ipv4_address: 172.25.0.13
    restart: unless-stopped

  # Camera 4: Moderately vulnerable - Weak password, open Telnet
  camera4-moderate:
    build: ./camera-simulator
    container_name: smartcam-demo-cam4
    environment:
      - MODEL=BudgetCam 500
      - FIRMWARE=1.5.1
      - DEFAULT_USER=admin
      - DEFAULT_PASS=password
      - OPEN_PORTS=23,80,554
      - EXPOSED=false
    ports:
      - "8084:80"      # HTTP interface
      - "2324:23"      # Telnet (vulnerable)
      - "5544:554"     # RTSP stream
    networks:
      smartcam_net:
        ipv4_address: 172.25.0.14
    restart: unless-stopped

networks:
  smartcam_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24
